version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: customer-support-hub-mysql
    environment:
      MYSQL_DATABASE: supporthub
      MYSQL_USER: supporthub
      MYSQL_PASSWORD: supporthub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build: .
    container_name: customer-support-hub-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/supporthub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: supporthub
      SPRING_DATASOURCE_PASSWORD: supporthub
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  mysql_data:
